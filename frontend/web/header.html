<!-- Bulletproof Static Header Component -->
<header id="header-container" class="main-header">
    <nav class="navbar">
        <!-- Logo -->
        <a href="#" class="logo-btn" data-route="home" onclick="event.preventDefault(); window.navigate('home');">
            <img src="assets/logo.webp" alt="DC NEET Counselling" class="nav-logo-img" fetchpriority="high">
        </a>

        <!-- Center Pill Navigation -->
        <div class="nav-pill-horizontal">
            <ul class="nav-pill-container" id="navLinks">
                <li><a href="#" data-route="home" class="nav-pill-link" onclick="event.preventDefault(); window.navigate('home');">Home</a></li>
                <li><a href="#" data-route="blog" class="nav-pill-link" onclick="event.preventDefault(); window.navigate('blog');">Blog</a></li>
                <li><a href="#" data-route="ebooks" class="nav-pill-link" onclick="event.preventDefault(); window.navigate('ebooks');">eBooks</a></li>
                <li><a href="#" data-route="about" class="nav-pill-link" onclick="event.preventDefault(); window.navigate('about');">About Us</a></li>
                <li><a href="#" data-route="contact" class="nav-pill-link" onclick="event.preventDefault(); window.navigate('contact');">Contact Us</a></li>
                <li><a href="#" data-route="privacy-policy" class="nav-pill-link" onclick="event.preventDefault(); window.navigate('privacy-policy');">Privacy Policy</a></li>
            </ul>
        </div>

        <!-- Action Buttons / Auth -->
        <div class="nav-actions" id="authContainer">
            <a href="#" class="btn-book-counselling" onclick="event.preventDefault(); window.navigate('counselling');">Book Counselling</a>
            
            <div id="authWrapper" style="display: flex; align-items: center; gap: 12px; position: relative;">
                <a href="#" id="loginBtn" class="btn-ghost" onclick="event.preventDefault(); window.navigate('login');" style="text-decoration: none; font-weight: 600; color: #4b5563;">Login</a>
                
                <!-- Cart Icon + Badge -->
                <button id="cartBtnNavbar" class="cart-nav-btn" aria-label="View Cart" onclick="window.navigate('cart')" style="display: none; position: relative; background: none; border: none; padding: 8px; cursor: pointer; color: #4b5563;">
                    <i class="fas fa-shopping-cart" style="font-size: 1.25rem;"></i>
                    <span class="cart-badge" style="display: none; position: absolute; top: -2px; right: -2px; background: #ef4444; color: white; font-size: 10px; font-weight: 700; width: 17px; height: 17px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white;">0</span>
                </button>

                <!-- Profile Button (Shown when logged in) -->
                <button id="profileDropdownBtn" class="profile-btn" aria-label="User Profile Menu" aria-haspopup="true" aria-expanded="false" style="display: none;" onclick="document.getElementById('profileDropdown').classList.toggle('active'); this.setAttribute('aria-expanded', this.getAttribute('aria-expanded') === 'true' ? 'false' : 'true');">
                    <span id="pdAvatarInitial">S</span>
                </button>
                
                <!-- Profile Dropdown (Modern) -->
                <div id="profileDropdown" role="menu">
                    <div class="pd-header">
                        <div class="pd-avatar" id="pdHeaderAvatar" aria-hidden="true">S</div>
                        <div class="pd-info">
                            <div class="pd-name" id="pdName">Student Name</div>
                            <div class="pd-email" id="pdEmail">student@email.com</div>
                            <div class="pd-mobile" id="pdMobile" style="font-size: 0.75rem; color: #9ca3af; margin-top: 2px;">No Mobile Number</div>
                        </div>
                    </div>
                    <div class="pd-menu">
                        <div class="pd-link" role="menuitem" onclick="window.navigate('dashboard')">👤 My Profile</div>

                        <div class="pd-link" role="menuitem" onclick="window.navigate('wishlist')">❤️ Wishlist</div>
                    </div>
                    <div class="pd-divider"></div>
                    <button class="pd-logout" role="menuitem" onclick="window.doLogout()">🚪 Sign Out</button>
                </div>
            </div>
            
            <!-- Mobile Hamburger Button -->
            <button id="mobileMenuBtn" class="mobile-menu-btn" aria-label="Open mobile menu" aria-expanded="false" aria-controls="mobileDrawer" onclick="document.getElementById('mobileDrawer').classList.add('active'); document.getElementById('mobileDrawerOverlay').classList.add('active'); this.setAttribute('aria-expanded', 'true');">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </div>
    </nav>

    <!-- Mobile Drawer Overlay -->
    <div id="mobileDrawerOverlay" class="mobile-drawer-overlay" onclick="document.getElementById('mobileDrawer').classList.remove('active'); this.classList.remove('active'); document.getElementById('mobileMenuBtn').setAttribute('aria-expanded', 'false');"></div>

    <!-- Mobile Drawer (Center Card) -->
    <div id="mobileDrawer" class="mobile-drawer" role="dialog" aria-modal="true" aria-label="Mobile Navigation Menu">
        <button class="mobile-close-btn" aria-label="Close mobile menu" onclick="document.getElementById('mobileDrawer').classList.remove('active'); document.getElementById('mobileDrawerOverlay').classList.remove('active'); document.getElementById('mobileMenuBtn').setAttribute('aria-expanded', 'false');">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>

        <div class="md-content">
            <!-- Menu Items -->
            <a href="#" class="md-link" data-route="home" onclick="event.preventDefault(); window.navigate('home'); document.getElementById('mobileDrawer').classList.remove('active'); document.getElementById('mobileDrawerOverlay').classList.remove('active');">Home</a>
            <a href="#" class="md-link" data-route="blog" onclick="event.preventDefault(); window.navigate('blog'); document.getElementById('mobileDrawer').classList.remove('active'); document.getElementById('mobileDrawerOverlay').classList.remove('active');">Blog</a>
            <a href="#" class="md-link" data-route="ebooks" onclick="event.preventDefault(); window.navigate('ebooks'); document.getElementById('mobileDrawer').classList.remove('active'); document.getElementById('mobileDrawerOverlay').classList.remove('active');">eBooks</a>
            <a href="#" class="md-link" data-route="about" onclick="event.preventDefault(); window.navigate('about'); document.getElementById('mobileDrawer').classList.remove('active'); document.getElementById('mobileDrawerOverlay').classList.remove('active');">About Us</a>
            <a href="#" class="md-link" data-route="contact" onclick="event.preventDefault(); window.navigate('contact'); document.getElementById('mobileDrawer').classList.remove('active'); document.getElementById('mobileDrawerOverlay').classList.remove('active');">Contact Us</a>
            <a href="#" class="md-link" data-route="privacy-policy" onclick="event.preventDefault(); window.navigate('privacy-policy'); document.getElementById('mobileDrawer').classList.remove('active'); document.getElementById('mobileDrawerOverlay').classList.remove('active');">Privacy Policy</a>
            
            <div class="md-divider"></div>

            <!-- CTA Buttons Output: Dynamic Auth Managed by index.html -->
            <div class="md-cta-container">
                <a href="#" class="md-cta-btn" onclick="event.preventDefault(); window.navigate('counselling'); document.getElementById('mobileDrawer').classList.remove('active'); document.getElementById('mobileDrawerOverlay').classList.remove('active');">Book Counselling</a>
                
                <!-- Logged Out State Button -->
                <div id="mdLoggedOutContent" style="display: flex; width: 100%;">
                    <a href="#" class="md-login-btn" onclick="event.preventDefault(); window.navigate('login'); document.getElementById('mobileDrawer').classList.remove('active'); document.getElementById('mobileDrawerOverlay').classList.remove('active');">Login</a>
                </div>
                
                <!-- Logged In State Menu -->
                <div id="mdLoggedInContent" style="display: none; width: 100%; flex-direction: column; gap: 12px;">
                    <a href="#" class="md-link" onclick="event.preventDefault(); window.navigate('dashboard'); document.getElementById('mobileDrawer').classList.remove('active'); document.getElementById('mobileDrawerOverlay').classList.remove('active');">👤 My Profile</a>

                    <a href="#" class="md-link" onclick="event.preventDefault(); window.navigate('wishlist'); document.getElementById('mobileDrawer').classList.remove('active'); document.getElementById('mobileDrawerOverlay').classList.remove('active');">❤️ Wishlist</a>
                    <button class="md-cta-btn logout" onclick="window.doLogout(); document.getElementById('mobileDrawer').classList.remove('active'); document.getElementById('mobileDrawerOverlay').classList.remove('active');">Sign Out</button>
                    <!-- Hidden elements so we don't break existing index.html auth logic target elements -->
                    <span id="mdAvatar" style="display:none;"></span>
                    <span id="mdUsername" style="display:none;"></span>
                    <span id="mdUserLinks" style="display:none;"></span>
                    <span id="mdUserDivider" style="display:none;"></span>
                </div>
            </div>
        </div>
    </div>
</header>
