<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful | DC Neet Counselling</title>
    <link rel="icon" type="image/jpeg" href="../assets/logo.jpg" />
    <!-- Use the existing global styles -->
    <link rel="stylesheet" href="../css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }
        .thank-you-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        .success-icon {
            color: #16a34a;
            font-size: 64px;
            margin-bottom: 20px;
        }
        .thank-you-title {
            color: #1e293b;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .thank-you-msg {
            color: #64748b;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn-home {
            display: inline-block;
            background: #2563eb;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .btn-home:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="thank-you-card">
        <div class="success-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1 class="thank-you-title">Payment Successful ✅</h1>
        <p class="thank-you-msg">
            We have received your payment successfully.<br>
            Your eBook(s) will be sent to your WhatsApp and Email within 12 hours.
        </p>
        
        <div id="order-summary" style="display:none; background:#f1f5f9; text-align:left; padding:20px; border-radius:10px; margin-bottom:30px;">
            <p style="margin:0 0 5px; font-size:14px; color:#475569;"><strong>Product:</strong> <span id="summary-product"></span></p>
            <p style="margin:0 0 5px; font-size:14px; color:#475569;"><strong>Amount Paid:</strong> ₹<span id="summary-amount"></span></p>
            <p style="margin:0 0 0px; font-size:14px; color:#475569;"><strong>Payment ID:</strong> <span id="summary-id"></span></p>
        </div>

        <a href="/#orders" class="btn-home">Go to Profile</a>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const params = new URLSearchParams(window.location.search);
            const product = params.get('product');
            const amount = params.get('amount');
            const order_id = params.get('order_id');
            
            if (product && amount) {
                document.getElementById('summary-product').textContent = product;
                document.getElementById('summary-amount').textContent = amount;
                document.getElementById('summary-id').textContent = order_id || "N/A";
                document.getElementById('order-summary').style.display = 'block';
            }
        });
    </script>
</body>
</html>
