<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful!</title>
    <link rel="icon" type="image/jpeg" href="../assets/logo.jpg" />
    <!-- Use the existing global styles -->
    <link rel="stylesheet" href="../css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }
        .thank-you-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        .success-icon {
            color: #16a34a;
            font-size: 64px;
            margin-bottom: 20px;
        }
        .thank-you-title {
            color: #1e293b;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .thank-you-msg {
            color: #64748b;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn-home {
            display: inline-block;
            background: #2563eb;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .btn-home:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="thank-you-card">
        <div class="success-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1 class="thank-you-title">Payment Successful!</h1>
        <p class="thank-you-msg">
            We have received your payment successfully.<br>
            Your eBook(s) will be sent to your WhatsApp and Email within 12 hours.
        </p>
        
        <div id="order-summary" style="display:none; background:#f1f5f9; text-align:left; padding:20px; border-radius:10px; margin-bottom:30px;">
            <p style="margin:0 0 5px; font-size:14px; color:#475569;"><strong>Product:</strong> <span id="summary-product"></span></p>
            <p style="margin:0 0 5px; font-size:14px; color:#475569;"><strong>Amount Paid:</strong> ₹<span id="summary-amount"></span></p>
            <p style="margin:0 0 0px; font-size:14px; color:#475569;"><strong>Payment ID:</strong> <span id="summary-id"></span></p>
        </div>

        <a href="/#orders" class="btn-home">Go to Profile</a>
    </div>

    <script>
        console.log('🔥 Thank You Page Loaded');

        const params = new URLSearchParams(window.location.search);
        const order_id = params.get('order_id') || 'ORDER_' + Date.now();
        const amount = params.get('amount') || 0;
        const product = params.get('product') || '';
        const coupon = params.get('coupon') || localStorage.getItem('appliedCoupon') || null;

        const BACKEND_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:3000/api' 
            : 'https://dcneetcounselling.onrender.com/api';

        try {
            const orderData = {
                order_id,
                total: Number(amount),
                coupon
            };

            console.log('📦 Sending order:', orderData);

            fetch(`${BACKEND_URL}/track-order`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(orderData)
            })
            .then(res => res.json())
            .then(data => {
                console.log('✅ Tracking success:', data);
            })
            .catch(err => {
                console.error('❌ Tracking error:', err);
            });

        } catch (err) {
            console.error('❌ Script crashed:', err);
        }

        document.addEventListener("DOMContentLoaded", function() {
            if (product && amount) {
                document.getElementById('summary-product').textContent = product;
                document.getElementById('summary-amount').textContent = amount;
                document.getElementById('summary-id').textContent = order_id || "N/A";
                document.getElementById('order-summary').style.display = 'block';
            }
        });
    </script>
    <script>
        const affiliate_id = localStorage.getItem("affiliate_id");
        const applied_coupon = localStorage.getItem("applied_coupon") || coupon;
        
        // Try to retrieve email from session if possible, otherwise empty
        let customerEmail = window.orderData?.email || localStorage.getItem('email') || "";
        try {
            const pending = sessionStorage.getItem('pending_tracking');
            if (pending) {
                const p = JSON.parse(pending);
                if (p.email) customerEmail = p.email;
            }
        } catch(e) {}

        if (!customerEmail) {
            console.error("❌ GoAffPro Tracking Error: Customer email is missing!");
        }

        // 🔥 Use REAL order data (NOT static)
        window.goaffproOrder = {
            id: order_id, 
            total: Number(amount), 
            email: customerEmail, 
            coupon: applied_coupon
        };

        console.log("GoAffPro Order Data:", window.goaffproOrder);
    </script>
    <script src="https://api.goaffpro.com/loader.js"></script>
</body>
</html>
