<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiliate Login | DC Neet Counselling</title>
    <link rel="icon" type="image/jpeg" href="../../assets/logo.jpg" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 {
            color: #1e293b;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        button {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 15px;
        }
        button:hover {
            background: #1d4ed8;
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        #error-msg {
            color: #dc2626;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Affiliate Portal</h1>
        <p>Login to view your earnings and referrals.</p>

        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="john@example.com" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" id="loginBtn">Log In</button>
            <div id="error-msg"></div>
        </form>
    </div>

    <!-- Ensure correct path to app_v2.js which initializes Supabase -->
    <script src="../../js/app_v2.js"></script>
    <script>
        // If already logged in, redirect
        if (localStorage.getItem("affiliate_ref")) {
            window.location.href = "/affiliate/dashboard";
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('error-msg');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) return;

            btn.disabled = true;
            btn.textContent = "Logging in...";
            errorMsg.style.display = "none";

            try {
                const API_BASE = window.location.hostname === "localhost" 
                                   ? "http://localhost:3000/api" 
                                   : "https://dcneetcounselling-backend.onrender.com/api";

                const response = await fetch(`${API_BASE}/login-affiliate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const text = await response.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch (err) {
                    throw new Error("Invalid JSON response from server. Check API URL.");
                }

                if (!response.ok || !data.success) {
                    throw new Error(data.message || "Login failed");
                }

                // Store and redirect
                localStorage.setItem("affiliate_ref", data.ref_code);
                window.location.href = "/affiliate/dashboard";

            } catch (err) {
                console.error(err);
                errorMsg.textContent = err.message === "Server error" ? "Server error. Please try again." : (err.message || "An error occurred during login.");
                errorMsg.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.textContent = "Log In";
            }
        });
    </script>

</body>
</html>
