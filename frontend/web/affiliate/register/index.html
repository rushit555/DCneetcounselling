<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiliate Registration | DC Neet Counselling</title>
    <link rel="icon" type="image/jpeg" href="../../../assets/logo.jpg" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .register-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h1 {
            color: #1e293b;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .notice {
            background: #fffbeb;
            color: #b45309;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 30px;
            border: 1px solid #fef3c7;
        }
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        button {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 15px;
        }
        button:hover {
            background: #1d4ed8;
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .login-link {
            display: block;
            margin-top: 20px;
            font-size: 14px;
            color: #64748b;
            text-decoration: none;
        }
        .login-link span {
            color: #2563eb;
            font-weight: 600;
        }
        #message-box {
            font-size: 14px;
            margin-top: 20px;
            display: none;
            padding: 12px;
            border-radius: 8px;
        }
        .success { background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; }
        .error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    </style>
</head>
<body>

    <div class="register-card">
        <h1>Become an Affiliate</h1>
        <p>Join our program and start earning commissions.</p>
        
        <div class="notice">
            After signup, your account will be reviewed before activation.
        </div>

        <form id="registerForm">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="John Doe" required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="john@example.com" required>
            </div>

            <div class="input-group">
                <label>Desired Username (Ref Code)</label>
                <input type="text" id="ref_code" placeholder="john123" required pattern="[A-Za-z0-9]+" title="Only letters and numbers allowed">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Create a strong password" required minlength="6">
            </div>
            
            <button type="submit" id="submitBtn">Submit Application</button>
            <div id="message-box"></div>
        </form>

        <a href="/affiliate" class="login-link">Already an affiliate? <span>Login here</span></a>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msgBox = document.getElementById('message-box');
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const ref_code = document.getElementById('ref_code').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!name || !email || !ref_code || !password) return;

            btn.disabled = true;
            btn.textContent = "Submitting...";
            msgBox.style.display = "none";
            msgBox.className = "";

            try {
                const API_BASE = window.location.hostname === "localhost" 
                                   ? "http://localhost:3000/api" 
                                   : "https://dcneetcounselling-backend.onrender.com/api";

                const response = await fetch(`${API_BASE}/register-affiliate`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, email, ref_code, password })
                });

                if (!response.ok) {
                    throw new Error("Server error");
                }

                const data = await response.json();

                if (!data.success) {
                    msgBox.textContent = data.message || "Registration failed";
                    msgBox.classList.add("error");
                    msgBox.style.display = "block";
                    return;
                }

                msgBox.textContent = "Registration successful! Await approval.";
                msgBox.classList.add("success");
                msgBox.style.display = "block";
                
                // Clear form
                document.getElementById('registerForm').reset();

            } catch (err) {
                console.error("API Error:", err);
                msgBox.textContent = "Server not reachable. Please try again.";
                msgBox.classList.add("error");
                msgBox.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.textContent = "Submit Application";
            }
        });
    </script>

      font-size: 32px;
    }
  }
</style>
</body>
</html>
